<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音楽業界クイズ - Music Industry Quiz</title>
<style>
:root {
  --primary: #7c3aed;
  --primary-dark: #5b21b6;
  --primary-light: #a78bfa;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --bg-dark: #0f0d1a;
  --bg-card: #1a1730;
  --bg-card-hover: #241f3d;
  --text: #e8e6f0;
  --text-dim: #9b97b0;
  --correct: #10b981;
  --correct-bg: rgba(16, 185, 129, 0.15);
  --incorrect: #ef4444;
  --incorrect-bg: rgba(239, 68, 68, 0.15);
  --border: rgba(124, 58, 237, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.app-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}

/* Header */
.app-header {
  text-align: center;
  padding: 32px 0 24px;
}

.app-header h1 {
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.app-header .subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
}

/* Screen transitions */
.screen { display: none; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Category Selection */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.category-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.category-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--primary-light);
  transform: translateY(-2px);
}

.category-card.selected {
  border-color: var(--primary);
  background: rgba(124, 58, 237, 0.15);
}

.category-card .cat-icon { font-size: 1.5rem; margin-bottom: 6px; }
.category-card .cat-name { font-size: 0.95rem; font-weight: 600; }
.category-card .cat-count { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

.category-card .check-mark {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.category-card.selected .check-mark { display: flex; }

/* Stats bar on category cards */
.cat-stats {
  margin-top: 6px;
  font-size: 0.75rem;
  color: var(--accent-light);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: #fff;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-secondary {
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: var(--bg-card-hover); }

.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }

/* Question count selector */
.count-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.count-btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.2s;
}

.count-btn:hover { border-color: var(--primary-light); }
.count-btn.selected { background: var(--primary); border-color: var(--primary); }

/* Progress bar */
.progress-container {
  margin: 16px 0;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.progress-bar {
  height: 6px;
  background: rgba(124, 58, 237, 0.2);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Question card */
.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin: 16px 0;
}

.question-meta {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-category { background: rgba(124, 58, 237, 0.2); color: var(--primary-light); }
.badge-type { background: rgba(59, 130, 246, 0.2); color: var(--accent-light); }

.question-text {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 24px;
  line-height: 1.7;
}

/* Answer options */
.options-list { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-dark);
  color: var(--text);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--primary-light);
  background: var(--bg-card-hover);
}

.option-btn:disabled { cursor: default; }

.option-btn.correct {
  border-color: var(--correct);
  background: var(--correct-bg);
  animation: pulse-correct 0.5s ease;
}

.option-btn.incorrect {
  border-color: var(--incorrect);
  background: var(--incorrect-bg);
  animation: shake 0.4s ease;
}

@keyframes pulse-correct {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Matching question */
.matching-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.matching-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.matching-term {
  flex: 1;
  min-width: 120px;
  padding: 10px 14px;
  background: rgba(124, 58, 237, 0.1);
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.9rem;
}

.matching-select {
  flex: 1.5;
  min-width: 160px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-dark);
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
}

.matching-select:disabled { opacity: 0.7; }

.matching-submit-btn {
  margin-top: 8px;
  align-self: flex-end;
}

/* Explanation */
.explanation {
  margin-top: 20px;
  padding: 16px;
  border-radius: 10px;
  background: rgba(59, 130, 246, 0.1);
  border-left: 3px solid var(--accent);
  font-size: 0.9rem;
  line-height: 1.7;
  animation: fadeIn 0.3s ease;
}

.explanation-label {
  font-weight: 700;
  color: var(--accent-light);
  margin-bottom: 4px;
}

/* Result screen */
.result-card {
  text-align: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  margin: 20px 0;
}

.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 800;
  position: relative;
}

.score-circle::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  padding: 4px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.score-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; }

.result-message { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
.result-sub { color: var(--text-dim); font-size: 0.9rem; }

/* Category stats */
.cat-stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin: 20px 0;
}

.cat-stat-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}

.cat-stat-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

.cat-stat-bar {
  height: 4px;
  background: rgba(124, 58, 237, 0.2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}

.cat-stat-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 2px;
  transition: width 0.6s ease;
}

.cat-stat-text { font-size: 0.75rem; color: var(--text-dim); }

/* Review section */
.review-section { margin: 24px 0; }
.review-section h3 { font-size: 1.1rem; margin-bottom: 16px; }

.review-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
}

.review-item .q-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; }
.review-item .q-text { font-weight: 600; margin-bottom: 10px; }
.review-item .your-answer { color: var(--incorrect); font-size: 0.9rem; }
.review-item .correct-answer { color: var(--correct); font-size: 0.9rem; margin-bottom: 8px; }

.review-explanation {
  font-size: 0.85rem;
  color: var(--text-dim);
  padding: 10px;
  background: rgba(59, 130, 246, 0.08);
  border-radius: 8px;
  line-height: 1.6;
}

/* Section titles */
.section-title {
  font-size: 1.2rem;
  font-weight: 700;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-desc {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-bottom: 16px;
}

/* All-select button */
.select-all-btn {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 0.8rem;
  cursor: pointer;
  margin-bottom: 12px;
}

.select-all-btn:hover { color: var(--text); border-color: var(--primary-light); }

/* Responsive */
@media (max-width: 600px) {
  .app-header h1 { font-size: 1.4rem; }
  .category-grid { grid-template-columns: 1fr; }
  .question-card { padding: 20px; }
  .matching-row { flex-direction: column; gap: 6px; }
  .matching-term, .matching-select { min-width: 100%; }
  .score-circle { width: 120px; height: 120px; font-size: 2rem; }
}
</style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <h1>♪ 音楽業界クイズ</h1>
    <p class="subtitle">Music Industry Knowledge Quiz</p>
  </header>

  <!-- Home / Category Selection -->
  <div id="screen-home" class="screen active">
    <div class="section-title">カテゴリを選択</div>
    <p class="section-desc">出題するカテゴリを選んでください（複数選択可）</p>
    <button class="select-all-btn" id="btn-select-all">すべて選択 / 解除</button>
    <div class="category-grid" id="category-grid"></div>

    <div class="section-title">出題数</div>
    <div class="count-selector" id="count-selector"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btn-start" disabled>クイズを開始</button>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="screen-quiz" class="screen">
    <div class="progress-container">
      <div class="progress-info">
        <span id="progress-text">1 / 10</span>
        <span id="score-text">正解: 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="question-card" id="question-card"></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-next" style="display:none">次の問題へ</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="score-circle" id="score-circle">
        <span id="final-score">0</span>
        <span class="score-label">点</span>
      </div>
      <div class="result-message" id="result-message"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>

    <div class="section-title">カテゴリ別 正答率</div>
    <div class="cat-stats-grid" id="cat-stats-grid"></div>

    <div class="review-section" id="review-section">
      <h3>間違えた問題の復習</h3>
      <div id="review-list"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-retry-wrong" style="display:none">間違えた問題を再挑戦</button>
      <button class="btn btn-primary" id="btn-home">トップに戻る</button>
    </div>
  </div>
</div>

<script>
// ========================================================
// 問題データ（将来的に外部JSONに切り出し可能な構造）
// ========================================================
const quizData = {
  categories: [
    { id: 1, name: "音楽業界の基礎知識", icon: "🎵" },
    { id: 2, name: "業界団体", icon: "🏛️" },
    { id: 3, name: "配信事業", icon: "📱" },
    { id: 4, name: "メタデータ", icon: "🔢" },
    { id: 5, name: "出版社業界", icon: "📝" },
    { id: 6, name: "実演家団体", icon: "🎤" },
    { id: 7, name: "著作権", icon: "©️" },
    { id: 8, name: "放送二次使用料", icon: "📡" },
    { id: 9, name: "音楽原盤", icon: "💿" },
    { id: 10, name: "レコード会社・レーベル", icon: "🏢" },
    { id: 11, name: "プロモーション・マーケティング", icon: "📣" },
    { id: 12, name: "ライブ・コンサート事業", icon: "🎸" },
    { id: 13, name: "国際条約・法制度", icon: "🌐" },
    { id: 14, name: "音楽テクノロジー", icon: "🤖" }
  ],

  questions: [
    // ===== カテゴリ1: 音楽業界の基礎知識 =====
    {
      id: 1, category: 1, type: "multiple",
      question: "音楽の権利は大きく2つに分かれます。「著作権」ともう1つは何でしょう？",
      options: ["著作隣接権", "肖像権", "特許権", "商標権"],
      answer: 0,
      explanation: "音楽の権利は「著作権」（作詞家・作曲家の権利）と「著作隣接権」（実演家・レコード製作者・放送事業者の権利）に大別されます。著作権法で定められた基本的な権利構造です。"
    },
    {
      id: 2, category: 1, type: "truefalse",
      question: "「作詞家」と「作曲家」は著作隣接権者である。",
      answer: false,
      explanation: "作詞家・作曲家は「著作権者（著作者）」です。著作隣接権者は実演家、レコード製作者、放送事業者、有線放送事業者を指します。"
    },
    {
      id: 3, category: 1, type: "multiple",
      question: "音楽業界における「印税」の英語表記として正しいものはどれですか？",
      options: ["Royalty", "Commission", "Dividend", "Premium"],
      answer: 0,
      explanation: "音楽業界で使われる「印税」は英語で「Royalty（ロイヤルティ）」と呼ばれます。楽曲の使用に対して権利者に支払われる対価のことです。"
    },
    {
      id: 4, category: 1, type: "fillin",
      question: "音楽の権利処理において、作詞・作曲に関する権利を「___権」、録音された音源に関する権利を「原盤権」と呼びます。",
      options: ["著作", "演奏", "録音", "配信"],
      answer: 0,
      explanation: "作詞・作曲に関する権利は「著作権」、録音された音源（マスター）に関する権利は「原盤権」と呼ばれ、音楽ビジネスではこの2つの権利処理が基本となります。"
    },

    // ===== カテゴリ2: 業界団体 =====
    {
      id: 5, category: 2, type: "multiple",
      question: "JASRACとNexToneの契約形態の違いとして正しいのはどれですか？",
      options: [
        "JASRACは信託契約、NexToneは委任契約（取次ぎ）",
        "JASRACは委任契約、NexToneは信託契約",
        "どちらも信託契約",
        "どちらも委任契約"
      ],
      answer: 0,
      explanation: "JASRACは「信託契約」により著作権が委託者からJASRACに移転します。一方NexToneは「委任契約」における「取次ぎ」であり、著作権は権利者に留まったままです。この違いは権利者にとって大きな意味を持ちます。"
    },
    {
      id: 6, category: 2, type: "truefalse",
      question: "日本の音楽著作権管理事業者はJASRACの1社独占であり、他に管理事業者は存在しない。",
      answer: false,
      explanation: "2001年の著作権等管理事業法施行後、NexTone（旧イーライセンスとジャパン・ライツ・クリアランスが合併）が参入し、現在はJASRACとNexToneの2社が大手として全体の95%以上を管理しています。"
    },
    {
      id: 7, category: 2, type: "multiple",
      question: "日本レコード協会（RIAJ）の主な役割として正しいものはどれですか？",
      options: [
        "レコード製作者の権利擁護とISRCの管理",
        "作詞家・作曲家への印税分配",
        "コンサートチケットの販売管理",
        "放送番組の制作管理"
      ],
      answer: 0,
      explanation: "日本レコード協会（RIAJ）は、レコード製作者の権利擁護、音楽文化の振興、ISRCの日本国内での管理・発行などを担う業界団体です。ゴールドディスク認定なども行っています。"
    },
    {
      id: 8, category: 2, type: "fillin",
      question: "NexToneは2016年に「イーライセンス」と「___」が合併して誕生した著作権管理事業者です。",
      options: ["ジャパン・ライツ・クリアランス", "日本音楽出版社協会", "音楽制作者連盟", "日本芸能実演家団体協議会"],
      answer: 0,
      explanation: "NexToneは、2016年にイーライセンスとジャパン・ライツ・クリアランス（JRC）が合併して誕生しました。JASRACに次ぐ音楽著作権管理事業者として成長を続けています。"
    },

    // ===== カテゴリ3: 配信事業 =====
    {
      id: 9, category: 3, type: "multiple",
      question: "2025年時点で、世界の音楽ストリーミング市場シェアが最も高いサービスはどれですか？",
      options: ["Spotify", "Apple Music", "YouTube Music", "Amazon Music"],
      answer: 0,
      explanation: "2025年時点で、Spotifyが世界の音楽ストリーミング市場で約31〜37%のシェアを占めトップです。Apple Musicが約12〜15%、Amazon MusicやYouTube Musicが約10%前後で続いています。"
    },
    {
      id: 10, category: 3, type: "truefalse",
      question: "Spotifyのビジネスモデルは、有料会員（プレミアム）の収入のみで成り立っている。",
      answer: false,
      explanation: "Spotifyは「フリーミアムモデル」を採用しています。無料の広告付きプラン（Free）と有料のプレミアムプランの2種類があり、広告収入とサブスクリプション収入の両方で運営されています。"
    },
    {
      id: 11, category: 3, type: "multiple",
      question: "音楽配信における「DSP」の正式名称は何ですか？",
      options: [
        "Digital Service Provider",
        "Digital Sound Platform",
        "Digital Streaming Protocol",
        "Digital Song Publisher"

// ========================================================
// アプリケーション状態管理（メモリ内）
// ========================================================
const appState = {
  selectedCategories: new Set(),
  questionCount: 10,
  currentQuestions: [],
  currentIndex: 0,
  score: 0,
  answers: [], // { questionId, userAnswer, isCorrect }
  categoryStats: {} // categoryId -> { correct, total }
};

// ========================================================
// ユーティリティ関数
// ========================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCategoryById(id) {
  return quizData.categories.find(c => c.id === id);
}

function getQuestionsForCategories(categoryIds) {
  return quizData.questions.filter(q => categoryIds.has(q.category));
}

function getTypeLabel(type) {
  const labels = { multiple: "4択", truefalse: "○×", fillin: "穴埋め", matching: "マッチング" };
  return labels[type] || type;
}

// ========================================================
// 画面切り替え
// ========================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ========================================================
// ホーム画面の初期化
// ========================================================
function initHome() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';

  quizData.categories.forEach(cat => {
    const count = quizData.questions.filter(q => q.category === cat.id).length;
    const stats = appState.categoryStats[cat.id];
    const statsHtml = stats && stats.total > 0
      ? `<div class="cat-stats">正答率: ${Math.round(stats.correct / stats.total * 100)}% (${stats.correct}/${stats.total})</div>`
      : '';

    const card = document.createElement('div');
    card.className = 'category-card';
    card.dataset.id = cat.id;
    card.innerHTML = `
      <div class="check-mark">✓</div>
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${count}問</div>
      ${statsHtml}
    `;
    card.addEventListener('click', () => toggleCategory(cat.id, card));
    grid.appendChild(card);
  });

  updateCountSelector();
  updateStartButton();
}

function toggleCategory(id, card) {
  if (appState.selectedCategories.has(id)) {
    appState.selectedCategories.delete(id);
    card.classList.remove('selected');
  } else {
    appState.selectedCategories.add(id);
    card.classList.add('selected');
  }
  updateCountSelector();
  updateStartButton();
}

function updateCountSelector() {
  const total = getQuestionsForCategories(appState.selectedCategories).length;
  const container = document.getElementById('count-selector');
  const counts = [5, 10, 20].filter(n => n <= total);
  if (total > 0) counts.push(total);
  const uniqueCounts = [...new Set(counts)];

  container.innerHTML = '';
  uniqueCounts.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'count-btn' + (appState.questionCount === n ? ' selected' : '');
    btn.textContent = n === total ? `全問 (${n})` : `${n}問`;
    btn.addEventListener('click', () => {
      appState.questionCount = n;
      container.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    container.appendChild(btn);
  });

  if (!uniqueCounts.includes(appState.questionCount) && uniqueCounts.length > 0) {
    appState.questionCount = uniqueCounts[0];
    container.querySelector('.count-btn')?.classList.add('selected');
  }
}

function updateStartButton() {
  document.getElementById('btn-start').disabled = appState.selectedCategories.size === 0;
}

// ========================================================
// クイズ開始
// ========================================================
function startQuiz(questions) {
  const pool = questions || shuffle(getQuestionsForCategories(appState.selectedCategories));
  appState.currentQuestions = pool.slice(0, appState.questionCount);
  appState.currentIndex = 0;
  appState.score = 0;
  appState.answers = [];

  showScreen('screen-quiz');
  renderQuestion();
}

// ========================================================
// 問題描画
// ========================================================
function renderQuestion() {
  const q = appState.currentQuestions[appState.currentIndex];
  const total = appState.currentQuestions.length;
  const card = document.getElementById('question-card');

  document.getElementById('progress-text').textContent = `${appState.currentIndex + 1} / ${total}`;
  document.getElementById('score-text').textContent = `正解: ${appState.score}`;
  document.getElementById('progress-fill').style.width = `${((appState.currentIndex) / total) * 100}%`;
  document.getElementById('btn-next').style.display = 'none';

  const cat = getCategoryById(q.category);

  let optionsHtml = '';

  if (q.type === 'multiple' || q.type === 'fillin') {
    optionsHtml = `<div class="options-list">${q.options.map((o, i) =>
      `<button class="option-btn" data-index="${i}">${o}</button>`
    ).join('')}</div>`;
  } else if (q.type === 'truefalse') {
    optionsHtml = `<div class="options-list">
      <button class="option-btn" data-value="true">○（正しい）</button>
      <button class="option-btn" data-value="false">×（誤り）</button>
    </div>`;
  } else if (q.type === 'matching') {
    optionsHtml = `<div class="matching-container">${q.pairs.map((p, i) => {
      const shuffledOpts = shuffle(p.options.map((o, oi) => ({ text: o, origIndex: oi })));
      return `<div class="matching-row">
        <div class="matching-term">${p.term}</div>
        <select class="matching-select" data-pair="${i}">
          <option value="">選択してください</option>
          ${shuffledOpts.map(o => `<option value="${o.origIndex}">${o.text}</option>`).join('')}
        </select>
      </div>`;
    }).join('')}
    <button class="btn btn-primary matching-submit-btn" id="btn-matching-submit">回答する</button>
    </div>`;
  }

  card.innerHTML = `
    <div class="question-meta">
      <span class="badge badge-category">${cat.icon} ${cat.name}</span>
      <span class="badge badge-type">${getTypeLabel(q.type)}</span>
    </div>
    <div class="question-text">${q.question}</div>
    ${optionsHtml}
  `;

  // Attach events
  if (q.type === 'multiple' || q.type === 'fillin') {
    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(q, parseInt(btn.dataset.index)));
    });
  } else if (q.type === 'truefalse') {
    card.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => handleTrueFalse(q, btn.dataset.value === 'true'));
    });
  } else if (q.type === 'matching') {
    document.getElementById('btn-matching-submit').addEventListener('click', () => handleMatching(q));
  }
}

// ========================================================
// 回答処理
// ========================================================
function handleAnswer(q, selectedIndex) {
  const isCorrect = selectedIndex === q.answer;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const idx = parseInt(b.dataset.index);
    if (idx === q.answer) b.classList.add('correct');
    if (idx === selectedIndex && !isCorrect) b.classList.add('incorrect');
  });

  recordAnswer(q, isCorrect, q.options[selectedIndex], q.options[q.answer]);
  showExplanation(q);
}

function handleTrueFalse(q, selected) {
  const isCorrect = selected === q.answer;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const val = b.dataset.value === 'true';
    if (val === q.answer) b.classList.add('correct');
    if (val === selected && !isCorrect) b.classList.add('incorrect');
  });

  const userAns = selected ? '○（正しい）' : '×（誤り）';
  const correctAns = q.answer ? '○（正しい）' : '×（誤り）';
  recordAnswer(q, isCorrect, userAns, correctAns);
  showExplanation(q);
}

function handleMatching(q) {
  const selects = document.querySelectorAll('.matching-select');
  let allCorrect = true;
  let allSelected = true;

  selects.forEach((sel, i) => {
    if (sel.value === '') { allSelected = false; return; }
    const isCorrect = parseInt(sel.value) === q.pairs[i].answer;
    sel.disabled = true;
    sel.style.borderColor = isCorrect ? 'var(--correct)' : 'var(--incorrect)';
    sel.style.background = isCorrect ? 'var(--correct-bg)' : 'var(--incorrect-bg)';
    if (!isCorrect) allCorrect = false;
  });

  if (!allSelected) return;

  document.getElementById('btn-matching-submit').style.display = 'none';

  const userAnswers = Array.from(selects).map((sel, i) => q.pairs[i].options[parseInt(sel.value)]).join(', ');
  const correctAnswers = q.pairs.map(p => p.options[p.answer]).join(', ');
  recordAnswer(q, allCorrect, userAnswers, correctAnswers);
  showExplanation(q);
}

function recordAnswer(q, isCorrect, userAnswer, correctAnswer) {
  if (isCorrect) appState.score++;
  appState.answers.push({
    questionId: q.id,
    userAnswer,
    correctAnswer,
    isCorrect,
    question: q.question,
    explanation: q.explanation,
    category: q.category
  });

  if (!appState.categoryStats[q.category]) {
    appState.categoryStats[q.category] = { correct: 0, total: 0 };
  }
  appState.categoryStats[q.category].total++;
  if (isCorrect) appState.categoryStats[q.category].correct++;
}

function showExplanation(q) {
  const card = document.getElementById('question-card');
  const expDiv = document.createElement('div');
  expDiv.className = 'explanation';
  expDiv.innerHTML = `<div class="explanation-label">解説</div><div>${q.explanation}</div>`;
  card.appendChild(expDiv);

  const btnNext = document.getElementById('btn-next');
  if (appState.currentIndex < appState.currentQuestions.length - 1) {
    btnNext.textContent = '次の問題へ';
  } else {
    btnNext.textContent = '結果を見る';
  }
  btnNext.style.display = 'inline-flex';
}

// ========================================================
// 次の問題 / 結果画面
// ========================================================
document.getElementById('btn-next').addEventListener('click', () => {
  appState.currentIndex++;
  if (appState.currentIndex < appState.currentQuestions.length) {
    renderQuestion();
  } else {
    showResult();
  }
});

function showResult() {
  showScreen('screen-result');
  const total = appState.currentQuestions.length;
  const score = appState.score;
  const pct = Math.round(score / total * 100);

  document.getElementById('final-score').textContent = pct;
  document.getElementById('progress-fill').style.width = '100%';

  let msg, sub;
  if (pct === 100) { msg = '完璧です！'; sub = '全問正解、素晴らしい！'; }
  else if (pct >= 80) { msg = '素晴らしい！'; sub = `${total}問中${score}問正解！`; }
  else if (pct >= 60) { msg = 'なかなか良いですね！'; sub = `${total}問中${score}問正解！`; }
  else if (pct >= 40) { msg = 'もう少し頑張りましょう！'; sub = `${total}問中${score}問正解`; }
  else { msg = '復習しましょう！'; sub = `${total}問中${score}問正解`; }

  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // Category stats
  const statsGrid = document.getElementById('cat-stats-grid');
  statsGrid.innerHTML = '';
  const relevantCats = [...new Set(appState.currentQuestions.map(q => q.category))];
  relevantCats.forEach(catId => {
    const cat = getCategoryById(catId);
    const stats = appState.categoryStats[catId];
    if (!stats) return;
    const rate = Math.round(stats.correct / stats.total * 100);
    const item = document.createElement('div');
    item.className = 'cat-stat-item';
    item.innerHTML = `
      <div class="cat-stat-name">${cat.icon} ${cat.name}</div>
      <div class="cat-stat-bar"><div class="cat-stat-fill" style="width:${rate}%"></div></div>
      <div class="cat-stat-text">${rate}% (${stats.correct}/${stats.total})</div>
    `;
    statsGrid.appendChild(item);
  });

  // Review wrong answers
  const wrongAnswers = appState.answers.filter(a => !a.isCorrect);
  const reviewSection = document.getElementById('review-section');
  const reviewList = document.getElementById('review-list');
  const retryBtn = document.getElementById('btn-retry-wrong');

  if (wrongAnswers.length === 0) {
    reviewSection.style.display = 'none';
    retryBtn.style.display = 'none';
  } else {
    reviewSection.style.display = 'block';
    retryBtn.style.display = 'inline-flex';
    reviewList.innerHTML = '';

    wrongAnswers.forEach(a => {
      const cat = getCategoryById(a.category);
      const item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML = `
        <div class="q-label">${cat.icon} ${cat.name}</div>
        <div class="q-text">${a.question}</div>
        <div class="your-answer">あなたの回答: ${a.userAnswer}</div>
        <div class="correct-answer">正解: ${a.correctAnswer}</div>
        <div class="review-explanation">${a.explanation}</div>
      `;
      reviewList.appendChild(item);
    });
  }
}

// ========================================================
// 間違えた問題を再挑戦
// ========================================================
document.getElementById('btn-retry-wrong').addEventListener('click', () => {
  const wrongIds = appState.answers.filter(a => !a.isCorrect).map(a => a.questionId);
  const wrongQs = quizData.questions.filter(q => wrongIds.includes(q.id));
  appState.questionCount = wrongQs.length;
  startQuiz(shuffle(wrongQs));
});

// ========================================================
// トップに戻る
// ========================================================
document.getElementById('btn-home').addEventListener('click', () => {
  showScreen('screen-home');
  initHome();
});

// ========================================================
// 全選択 / 解除
// ========================================================
document.getElementById('btn-select-all').addEventListener('click', () => {
  const allSelected = appState.selectedCategories.size === quizData.categories.length;
  const cards = document.querySelectorAll('.category-card');
  if (allSelected) {
    appState.selectedCategories.clear();
    cards.forEach(c => c.classList.remove('selected'));
  } else {
    quizData.categories.forEach(cat => appState.selectedCategories.add(cat.id));
    cards.forEach(c => c.classList.add('selected'));
  }
  updateCountSelector();
  updateStartButton();
});

// ========================================================
// クイズ開始ボタン
// ========================================================
document.getElementById('btn-start').addEventListener('click', () => startQuiz());

// ========================================================
// 初期化
// ========================================================
initHome();
</script>
</body>
</html>
