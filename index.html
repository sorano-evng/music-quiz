<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茅聼鲁忙楼陆忙楼颅莽聲聦茫聜炉茫聜陇茫聜潞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ============= HEADER ============= */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-title {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .app-subtitle {
            font-size: 1.1em;
            color: #9ca3af;
            font-weight: 300;
        }

        /* ============= START SCREEN ============= */
        .start-screen {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .instruction-text {
            text-align: center;
            color: #d1d5db;
            margin: 30px 0;
            font-size: 1.05em;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .category-card:hover {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.4) 0%, rgba(59, 130, 246, 0.4) 100%);
            border-color: rgba(167, 139, 250, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.2);
        }

        .category-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 1em;
            font-weight: 600;
            color: #e0e0e0;
            line-height: 1.4;
        }

        /* ============= QUESTION COUNT SELECTOR ============= */
        .question-count-screen {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: rgba(107, 70, 193, 0.3);
            border: 1px solid rgba(167, 139, 250, 0.5);
            color: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .back-button:hover {
            background: rgba(107, 70, 193, 0.5);
            border-color: rgba(167, 139, 250, 0.8);
        }

        .selected-category-display {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #a78bfa;
            font-weight: 600;
        }

        .count-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .count-button {
            padding: 20px;
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.3) 0%, rgba(59, 130, 246, 0.3) 100%);
            border: 2px solid rgba(167, 139, 250, 0.3);
            color: #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .count-button:hover {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.5) 0%, rgba(59, 130, 246, 0.5) 100%);
            border-color: rgba(167, 139, 250, 0.7);
            transform: translateY(-3px);
        }

        /* ============= QUIZ SCREEN ============= */
        .quiz-screen {
            animation: fadeIn 0.5s ease-out;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
            color: #9ca3af;
        }

        .progress-bar {
            height: 6px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a78bfa 0%, #60a5fa 100%);
            transition: width 0.3s ease;
        }

        .question-card {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .question-category {
            font-size: 0.9em;
            color: #a78bfa;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 30px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .blank-space {
            display: inline-block;
            background: rgba(167, 139, 250, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            border-bottom: 2px solid #a78bfa;
            font-weight: 700;
        }

        /* ============= ANSWER OPTIONS ============= */
        .options-container {
            display: grid;
            gap: 15px;
        }

        .option {
            padding: 18px 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(167, 139, 250, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            color: #e0e0e0;
            text-align: left;
            font-weight: 500;
        }

        .option:hover:not(.disabled) {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.4) 0%, rgba(96, 165, 250, 0.4) 100%);
            border-color: #a78bfa;
        }

        .option.correct {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(34, 197, 94, 0.2) 100%);
            border-color: #22c55e;
            color: #86efac;
        }

        .option.incorrect {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(239, 68, 68, 0.2) 100%);
            border-color: #ef4444;
            color: #fca5a5;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ============= MATCHING STYLE ============= */
        .matching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .matching-container {
                grid-template-columns: 1fr;
            }
        }

        .matching-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .matching-item {
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            font-size: 0.95em;
            color: #e0e0e0;
        }

        .matching-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .matching-left {
            padding: 12px;
            background: rgba(107, 70, 193, 0.2);
            border-radius: 6px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .matching-select {
            padding: 10px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
        }

        .matching-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============= TRUE/FALSE ============= */
        .boolean-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .bool-option {
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(167, 139, 250, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            color: #e0e0e0;
        }

        .bool-option:hover:not(.disabled) {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateY(-3px);
        }

        .bool-option.selected {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.4) 0%, rgba(96, 165, 250, 0.4) 100%);
            border-color: #a78bfa;
        }

        .bool-option.correct {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(34, 197, 94, 0.2) 100%);
            border-color: #22c55e;
            color: #86efac;
        }

        .bool-option.incorrect {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(239, 68, 68, 0.2) 100%);
            border-color: #ef4444;
            color: #fca5a5;
        }

        /* ============= FEEDBACK ============= */
        .feedback {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
            color: #86efac;
        }

        .feedback.incorrect {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #fca5a5;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .feedback-explanation {
            line-height: 1.6;
            color: #d1d5db;
        }

        /* ============= BUTTONS ============= */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            color: #0a0a1a;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(167, 139, 250, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(107, 70, 193, 0.3);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.5);
        }

        .btn-secondary:hover {
            background: rgba(107, 70, 193, 0.5);
            border-color: rgba(167, 139, 250, 0.8);
        }

        /* ============= RESULTS SCREEN ============= */
        .results-screen {
            animation: fadeIn 0.5s ease-out;
        }

        .results-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .results-title {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .score-display {
            font-size: 3.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .score-info {
            font-size: 1.2em;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .accuracy-percentage {
            font-size: 1.5em;
            color: #a78bfa;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #9ca3af;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .category-stats {
            margin-bottom: 40px;
        }

        .category-stats-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .category-result {
            background: linear-gradient(135deg, rgba(107, 70, 193, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-result-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .category-result-score {
            font-weight: 700;
            color: #a78bfa;
        }

        .wrong-answers-section {
            margin-top: 40px;
        }

        .wrong-answers-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ef4444;
        }

        .wrong-answer-item {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 15px;
        }

        .wrong-question {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        .wrong-details {
            font-size: 0.95em;
            color: #d1d5db;
            margin-bottom: 8px;
        }

        .wrong-explanation {
            font-size: 0.95em;
            color: #a78bfa;
            font-style: italic;
        }

        /* ============= MODALS ============= */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .modal-text {
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* ============= RESPONSIVEESSS ============= */
        @media (max-width: 768px) {
            .app-title {
                font-size: 2em;
            }

            .category-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .category-card {
                padding: 18px;
            }

            .question-card {
                padding: 20px;
            }

            .question-text {
                font-size: 1.1em;
            }

            .count-options {
                grid-template-columns: 1fr 1fr;
            }

            .boolean-options {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ============= UTILITY CLASSES ============= */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        /* ============= SCROLLBAR ============= */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(59, 130, 246, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(167, 139, 250, 0.8);
        }

        /* ============= LOADING STATE ============= */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(167, 139, 250, 0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="app-title">茅聸鲁忙楼路楼颅莽聲聦茫聜炉茫聜陇茫聜潞</h1>
            <p class="app-subtitle">忙聴楼忙聹卢茫聛庐茅聼鲁忙楼陆忙楼颅莽聲聦茫聛芦茫聛陇茫聛聞茫聛娄氓颅娄茫聛录茫聛聠</p>
        </div>

        <!-- START SCREEN -->
        <div id="startScreen" class="start-screen">
            <div class="instruction-text">茫聜芦茫聝聠茫聜麓茫聝陋茫聝录茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞</div>
            <div id="categoryGrid" class="category-grid"></div>
        </div>

        <!-- QUESTION COUNT SCREEN -->
        <div id="questionCountScreen" class="question-count-screen hidden">
            <button class="back-button" onclick="app.goBack()">芒聠聬 忙聢禄茫聜聥</button>
            <div class="selected-category-display" id="selectedCategoryDisplay"></div>
            <div class="instruction-text">氓聲聫茅隆聦忙聲掳茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞</div>
            <div class="count-options">
                <button class="count-button" onclick="app.startQuiz(5)">5氓聲聫</button>
                <button class="count-button" onclick="app.startQuiz(10)">10氓聲聫</button>
                <button class="count-button" onclick="app.startQuiz(20)">20氓聲聫</button>
                <button class="count-button" onclick="app.startQuiz(-1)">氓聟篓氓聲聫</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quizScreen" class="quiz-screen hidden">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">氓聲聫茅隆聦 1/10</span>
                    <span id="scoreText">忙颅拢猫搂拢: 0</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <div class="question-card">
                <div id="questionCategory" class="question-category"></div>
                <div id="questionText" class="question-text"></div>
                <div id="optionsContainer" class="options-container"></div>
                <div id="matchingContainer" class="hidden"></div>
                <div id="feedback" class="hidden"></div>
            </div>

            <div class="button-container">
                <button id="nextButton" class="btn btn-primary hidden" onclick="app.nextQuestion()">忙卢隆茫聛庐氓聲聫茅隆聦</button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="resultsScreen" class="results-screen hidden">
            <div class="results-header">
                <h2 class="results-title">茫聜炉茫聜陇茫聜潞氓庐聦盲潞聠茂录聛</h2>
                <div class="score-display" id="finalScore">0</div>
                <div class="score-info" id="scoreInfo">0/0 氓聲聫忙颅拢猫搂拢</div>
                <div class="accuracy-percentage" id="accuracyPercentage">0%</div>
            </div>

            <div id="statsGrid" class="stats-grid"></div>

            <div id="categoryStatsContainer" class="category-stats hidden">
                <h3 class="category-stats-title">茫聜芦茫聝聠茫聜麓茫聝陋茫聝录氓聢楼忙聢聬莽赂戮</h3>
                <div id="categoryStatsList"></div>
            </div>

            <div id="wrongAnswersContainer" class="wrong-answers-section hidden">
                <h3 class="wrong-answers-title">芒聹聨 氓戮漏莽驴聮: 茅聳聯茅聛聲茫聛拢茫聛聼氓聲聫茅隆聦</h3>
                <div id="wrongAnswersList"></div>
            </div>

            <div class="button-container mt-20">
                <button class="btn btn-primary" onclick="app.goToStart()">忙聹聙氓聢聺茫聛芦忙聢禄茫聜聥</button>
            </div>
        </div>
    </div>

    <!-- ERROR MODAL -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">茫聜篓茫聝漏茫聝录</h2>
            <p class="modal-text" id="errorMessage"></p>
            <div class="button-container">
                <button class="btn btn-primary" onclick="document.getElementById('errorModal').classList.remove('active')">盲潞聠猫搂拢</button>
            </div>
        </div>
    </div>

    <script>
        // ============= QUIZ APP =============
        const app = {
            // State
            questions: [],
            categories: [],
            selectedCategory: null,
            currentQuestion: 0,
            answers: [],
            correctCount: 0,
            quizQuestions: [],
            categoryIcons: {
                '茅聼鲁忙楼陆忙楼颅莽聲聦茫聛庐氓聼潞莽陇聨莽聼楼猫颅聵': '冒聼聯職',
                '忙楼颅莽聲聦氓聸拢盲陆聯': '冒聼聫聸茂赂聫',
                '茅聟聧盲驴隆盲潞聥忙楼颅': '冒聼聯卤',
                '茫聝隆茫聜驴茫聝聡茫聝录茫聜驴': '冒聼聫路茂赂聫',
                '氓聡潞莽聣聢莽陇戮忙楼颅莽聲聦': '冒聼聯聳',
                '氓庐聼忙录聰氓庐露氓聸拢盲陆聯': '冒聼聨陇',
                '猫聭聴盲陆聹忙篓漏': '芒職聳茂赂聫',
                '忙聰戮茅聙聛盲潞聦忙卢隆盲陆驴莽聰篓忙聳聶': '冒聼聯潞',
                '茅聼鲁忙楼陆氓聨聼莽聸陇': '冒聼聮驴',
                '茫聝卢茫聜鲁茫聝录茫聝聣盲录職莽陇戮茫聝禄茫聝卢茫聝录茫聝聶茫聝芦': '冒聼聨碌',
                '茅聼鲁忙楼陆茫聝聴茫聝颅茫聝垄茫聝录茫聜路茫聝搂茫聝鲁茫聝禄茫聝聻茫聝录茫聜卤茫聝聠茫聜拢茫聝鲁茫聜掳': '冒聼聯垄',
                '茫聝漏茫聜陇茫聝聳茫聝禄茫聜鲁茫聝鲁茫聜碌茫聝录茫聝聢盲潞聥忙楼颅': '冒聼聨颅',
                '氓聸陆茅職聸忙聺隆莽麓聞茫聝禄忙鲁聲氓聢露氓潞娄': '冒聼聦聧',
                '茅聼鲁忙楼陆茫聝聠茫聜炉茫聝聨茫聝颅茫聜赂茫聝录': '冒聼聰搂'
            },

            async init() {
                try {
                    await this.loadQuestions();
                    this.initializeCategories();
                    this.renderStart();
                } catch (error) {
                    this.showError('氓聲聫茅隆聦茫聛庐猫陋颅茫聛驴猫戮录茫聛驴茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼: ' + error.message);
                }
            },

            async loadQuestions() {
                try {
                    const response = await fetch('questions.json');
                    if (!response.ok) throw new Error('Failed to load questions');
                    this.questions = await response.json();
                } catch (error) {
                    throw new Error('questions.json茫聜聮猫陋颅茫聛驴猫戮录茫聜聛茫聛戮茫聛聸茫聜聯茫聛搂茫聛聴茫聛聼茫聙聜茫聝聲茫聜隆茫聜陇茫聝芦茫聛聦氓颅聵氓聹篓茫聛聶茫聜聥茫聛聯茫聛篓茫聜聮莽垄潞猫陋聧茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜');
                }
            },

            initializeCategories() {
                const categorySet = new Set(this.questions.map(q => q.category));
                this.categories = Array.from(categorySet).sort();
            },

            renderStart() {
                document.getElementById('startScreen').classList.remove('hidden');
                document.getElementById('questionCountScreen').classList.add('hidden');
                document.getElementById('quizScreen').classList.add('hidden');
                document.getElementById('resultsScreen').classList.add('hidden');

                const grid = document.getElementById('categoryGrid');
                grid.innerHTML = '';

                this.categories.forEach(category => {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    const icon = this.categoryIcons[category] || '冒聼聯聤';
                    const count = this.questions.filter(q => q.category === category).length;
                    card.innerHTML = `
                        <div class="category-icon">${icon}</div>
                        <div class="category-name">${category}</div>
                        <div style="font-size: 0.85em; color: #9ca3af; margin-top: 8px;">${count}氓聲聫</div>
                    `;
                    card.onclick = () => this.selectCategory(category);
                    grid.appendChild(card);
                });
            },

            selectCategory(category) {
                this.selectedCategory = category;
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('questionCountScreen').classList.remove('hidden');
                document.getElementById('selectedCategoryDisplay').textContent = category;
            },

            goBack() {
                this.selectedCategory = null;
                this.renderStart();
            },

            startQuiz(count) {
                const categoryQuestions = this.questions.filter(q => q.category === this.selectedCategory);

                if (count === -1) {
                    this.quizQuestions = categoryQuestions;
                } else {
                    this.quizQuestions = categoryQuestions.sort(() => Math.random() - 0.5).slice(0, count);
                }

                if (this.quizQuestions.length === 0) {
                    this.showError('茫聛聯茫聛庐茫聜芦茫聝聠茫聜麓茫聝陋茫聝录茫聛芦氓聲聫茅隆聦茫聛聦茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯');
                    return;
                }

                this.currentQuestion = 0;
                this.answers = [];
                this.correctCount = 0;
                this.renderQuiz();
            },

            renderQuiz() {
                document.getElementById('questionCountScreen').classList.add('hidden');
                document.getElementById('quizScreen').classList.remove('hidden');

                this.updateProgress();
                this.renderQuestion();
            },

            updateProgress() {
                const total = this.quizQuestions.length;
                const current = this.currentQuestion + 1;
                document.getElementById('progressText').textContent = `氓聲聫茅隆聦 ${current}/${total}`;
                document.getElementById('scoreText').textContent = `忙颅拢猫搂拢: ${this.correctCount}`;

                const percentage = (current / total) * 100;
                document.getElementById('progressFill').style.width = percentage + '%';
            },

            renderQuestion() {
                const question = this.quizQuestions[this.currentQuestion];
                document.getElementById('questionCategory').textContent = question.category;
                document.getElementById('questionText').innerHTML = this.formatQuestionText(question);
                document.getElementById('feedback').classList.add('hidden');
                document.getElementById('nextButton').classList.add('hidden');
                document.getElementById('optionsContainer').innerHTML = '';
                document.getElementById('matchingContainer').innerHTML = '';
                document.getElementById('matchingContainer').classList.add('hidden');

                switch (question.type) {
                    case 'multiple_choice':
                        this.renderMultipleChoice(question);
                        break;
                    case 'true_false':
                        this.renderTrueFalse(question);
                        break;
                    case 'fill_blank':
                        this.renderFillBlank(question);
                        break;
                    case 'matching':
                        this.renderMatching(question);
                        break;
                }
            },

            formatQuestionText(question) {
                if (question.type === 'fill_blank') {
                    return question.question.replace('___', '<span class="blank-space">茫聙聙茫聙聙茫聙聙</span>');
                }
                return question.question;
            },

            renderMultipleChoice(question) {
                const container = document.getElementById('optionsContainer');
                question.options.forEach((option, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.textContent = option;
                    btn.onclick = () => this.selectAnswer(index, question);
                    container.appendChild(btn);
                });
            },

            renderTrueFalse(question) {
                const container = document.getElementById('optionsContainer');
                container.className = 'boolean-options';

                const trueBtn = document.createElement('button');
                trueBtn.className = 'bool-option';
                trueBtn.textContent = '芒聴聥 忙颅拢猫搂拢';
                trueBtn.onclick = () => this.selectAnswer(true, question);

                const falseBtn = document.createElement('button');
                falseBtn.className = 'bool-option';
                falseBtn.textContent = '芒聹聲 盲赂聧忙颅拢猫搂拢';
                falseBtn.onclick = () => this.selectAnswer(false, question);

                container.appendChild(trueBtn);
                container.appendChild(falseBtn);
            },

            renderFillBlank(question) {
                const container = document.getElementById('optionsContainer');
                const shuffled = [...question.hints].sort(() => Math.random() - 0.5);

                shuffled.forEach((hint, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option';
                    btn.textContent = hint;
                    btn.onclick = () => this.selectAnswer(hint, question);
                    container.appendChild(btn);
                });
            },

            renderMatching(question) {
                const container = document.getElementById('matchingContainer');
                container.classList.remove('hidden');

                const pairs = [...question.pairs].sort(() => Math.random() - 0.5);
                const matchingHtml = question.pairs.map((pair, idx) => `
                    <div class="matching-pair">
                        <div class="matching-left">${pair.left}</div>
                        <select class="matching-select" id="matching_${idx}">
                            <option value="">茅聛赂忙聤聻...</option>
                            ${pairs.map(p => `<option value="${p.right}">${p.right}</option>`).join('')}
                        </select>
                    </div>
                `).join('');

                container.innerHTML = matchingHtml;

                const submitBtn = document.createElement('button');
                submitBtn.className = 'btn btn-primary';
                submitBtn.textContent = '氓聸聻莽颅聰茫聛聶茫聜聥';
                submitBtn.style.width = '100%';
                submitBtn.onclick = () => this.submitMatching(question);
                container.appendChild(submitBtn);
            },

            submitMatching(question) {
                const answers = [];
                const selects = document.querySelectorAll('.matching-select');

                for (let select of selects) {
                    if (!select.value) {
                        this.showError('茫聛聶茫聛鹿茫聛娄茫聛庐茅聽聟莽聸庐茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞');
                        return;
                    }
                    answers.push(select.value);
                }

                const correct = answers.every((answer, idx) => answer === question.pairs[idx].right);
                this.checkAnswer(correct, question);
            },

            selectAnswer(answer, question) {
                const correct = this.checkAnswerCorrect(answer, question);
                this.checkAnswer(correct, question);
            },

            checkAnswerCorrect(answer, question) {
                if (question.type === 'multiple_choice') {
                    return answer === question.answer;
                } else if (question.type === 'true_false') {
                    return answer === question.answer;
                } else if (question.type === 'fill_blank') {
                    return answer === question.answer;
                }
                return false;
            },

            checkAnswer(isCorrect, question) {
                this.answers.push({
                    questionId: question.id,
                    category: question.category,
                    question: question.question,
                    isCorrect: isCorrect,
                    explanation: question.explanation,
                    type: question.type
                });

                if (isCorrect) {
                    this.correctCount++;
                }

                this.showFeedback(isCorrect, question);
            },

            showFeedback(isCorrect, question) {
                const feedbackEl = document.getElementById('feedback');
                feedbackEl.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
                feedbackEl.innerHTML = `
                    <div class="feedback-title">${isCorrect ? '芒聹聯 忙颅拢猫搂拢' : '芒聹聲 盲赂聧忙颅拢猫搂拢'}</div>
                    <div class="feedback-explanation">${question.explanation}</div>
                `;
                feedbackEl.classList.remove('hidden');

                // Disable all options
                document.querySelectorAll('.option, .bool-option').forEach(el => {
                    el.classList.add('disabled');
                });

                // Highlight correct answer
                if (question.type === 'multiple_choice') {
                    document.querySelectorAll('.option').forEach((el, idx) => {
                        if (idx === question.answer) {
                            el.classList.add('correct');
                        }
                    });
                } else if (question.type === 'true_false') {
                    document.querySelectorAll('.bool-option').forEach(el => {
                        const isTrue = el.textContent.includes('忙颅拢猫搂拢');
                        if (isTrue === question.answer) {
                            el.classList.add('correct');
                        } else if (!isCorrect) {
                            el.classList.add('incorrect');
                        }
                    });
                } else if (question.type === 'fill_blank') {
                    document.querySelectorAll('.option').forEach(el => {
                        if (el.textContent === question.answer) {
                            el.classList.add('correct');
                        }
                    });
                }

                this.updateProgress();
                document.getElementById('nextButton').classList.remove('hidden');
            },

            nextQuestion() {
                this.currentQuestion++;
                if (this.currentQuestion < this.quizQuestions.length) {
                    this.renderQuestion();
                } else {
                    this.showResults();
                }
            },

            showResults() {
                document.getElementById('quizScreen').classList.add('hidden');
                document.getElementById('resultsScreen').classList.remove('hidden');

                const total = this.quizQuestions.length;
                const accuracy = Math.round((this.correctCount / total) * 100);

                document.getElementById('finalScore').textContent = this.correctCount;
                document.getElementById('scoreInfo').textContent = `${this.correctCount}/${total} 氓聲聫忙颅拢猫搂拢`;
                document.getElementById('accuracyPercentage').textContent = `忙颅拢莽颅聰莽聨聡: ${accuracy}%`;

                this.renderCategoryStats();
                this.renderWrongAnswers();
            },

            renderCategoryStats() {
                const categoryStats = {};
                this.answers.forEach(answer => {
                    if (!categoryStats[answer.category]) {
                        categoryStats[answer.category] = { correct: 0, total: 0 };
                    }
                    categoryStats[answer.category].total++;
                    if (answer.isCorrect) categoryStats[answer.category].correct++;
                });

                const list = document.getElementById('categoryStatsList');
                list.innerHTML = '';

                Object.keys(categoryStats).sort().forEach(category => {
                    const stat = categoryStats[category];
                    const percent = Math.round((stat.correct / stat.total) * 100);
                    const item = document.createElement('div');
                    item.className = 'category-result';
                    item.innerHTML = `
                        <span class="category-result-name">${category}</span>
                        <span class="category-result-score">${stat.correct}/${stat.total} (${percent}%)</span>
                    `;
                    list.appendChild(item);
                });

                if (Object.keys(categoryStats).length > 0) {
                    document.getElementById('categoryStatsContainer').classList.remove('hidden');
                }
            },

            renderWrongAnswers() {
                const wrongAnswers = this.answers.filter(a => !a.isCorrect);

                if (wrongAnswers.length === 0) {
                    document.getElementById('wrongAnswersContainer').classList.add('hidden');
                    return;
                }

                document.getElementById('wrongAnswersContainer').classList.remove('hidden');
                const list = document.getElementById('wrongAnswersList');
                list.innerHTML = '';

                wrongAnswers.forEach((answer, idx) => {
                    const item = document.createElement('div');
                    item.className = 'wrong-answer-item';
                    item.innerHTML = `
                        <div class="wrong-question">${idx + 1}. ${answer.question}</div>
                        <div class="wrong-details"><strong>茫聜芦茫聝聠茫聜麓茫聝陋茫聝录:</strong> ${answer.category}</div>
                        <div class="wrong-explanation"><strong>猫搂拢猫陋卢:</strong> ${answer.explanation}</div>
                    `;
                    list.appendChild(item);
                });
            },

            goToStart() {
                this.selectedCategory = null;
                this.currentQuestion = 0;
                this.answers = [];
                this.correctCount = 0;
                this.quizQuestions = [];
                this.renderStart();
            },

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                document.getElementById('errorModal').classList.add('active');
            }
        };

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
