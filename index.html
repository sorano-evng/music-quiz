<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽業界クイズ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f0a1a 0%, #1a0f2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 800px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(124, 58, 237, 0.2);
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Screen Display */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
        }

        .start-screen h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 50px;
        }

        .start-screen p {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #7c3aed;
            border: 2px solid #7c3aed;
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        /* Category Selection */
        .category-header {
            margin-bottom: 30px;
        }

        .category-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .category-card {
            background: #1a1333;
            border: 2px solid #2d1f4d;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .category-card:hover {
            border-color: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.2);
        }

        .category-card.selected {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(59, 130, 246, 0.2));
            border-color: #7c3aed;
        }

        .category-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #7c3aed;
        }

        .category-card .count {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .category-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Question Count Selection */
        .count-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .count-btn {
            padding: 15px;
            background: #1a1333;
            border: 2px solid #2d1f4d;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .count-btn:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .count-btn.selected {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border-color: transparent;
            color: white;
        }

        /* Quiz Screen */
        .quiz-container {
            background: #1a1333;
            border: 1px solid #2d1f4d;
            border-radius: 12px;
            padding: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2d1f4d;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            transition: width 0.3s ease;
        }

        .question-info {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
            text-align: center;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        .blank-placeholder {
            background: #2d1f4d;
            color: #7c3aed;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 15px;
            background: #2d1f4d;
            border: 2px solid transparent;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-btn.true-false {
            grid-column: auto;
        }

        .true-false-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Matching Questions */
        .matching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .matching-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .matching-term, .matching-definition {
            padding: 12px;
            background: #2d1f4d;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }

        .matching-term:hover, .matching-definition:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .matching-term.selected, .matching-definition.selected {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.2);
        }

        .matching-term.paired, .matching-definition.paired {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            cursor: default;
        }

        .matching-term.paired:hover, .matching-definition.paired:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .matching-pair-display {
            grid-column: 1 / -1;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .paired-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            margin: 5px 0;
            font-size: 0.95rem;
        }

        /* Feedback Animation */
        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            color: #10b981;
            animation: correctFlash 0.6s ease;
        }

        @keyframes correctFlash {
            0% { background: rgba(16, 185, 129, 0.5); }
            100% { background: rgba(16, 185, 129, 0.2); }
        }

        .feedback.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            color: #ef4444;
            animation: incorrectShake 0.5s ease;
        }

        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .feedback h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .feedback p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .feedback .explanation {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid currentColor;
            opacity: 0.9;
        }

        /* Results Screen */
        .results-container {
            background: #1a1333;
            border: 1px solid #2d1f4d;
            border-radius: 12px;
            padding: 30px;
        }

        .results-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .results-header h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .score-details {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .percentage {
            font-size: 1.3rem;
            color: #94a3b8;
        }

        .results-section {
            margin: 30px 0;
        }

        .results-section h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #7c3aed;
            border-bottom: 2px solid #2d1f4d;
            padding-bottom: 10px;
        }

        .category-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #2d1f4d;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .category-result .name {
            font-weight: 600;
        }

        .category-result .accuracy {
            color: #94a3b8;
        }

        .incorrect-questions {
            max-height: 400px;
            overflow-y: auto;
        }

        .incorrect-item {
            background: #2d1f4d;
            border-left: 4px solid #ef4444;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
        }

        .incorrect-item .q-text {
            font-weight: 600;
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        .incorrect-item .answer-row {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 15px;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .incorrect-item .label {
            color: #94a3b8;
            font-weight: 500;
        }

        .incorrect-item .your-answer {
            color: #ef4444;
        }

        .incorrect-item .correct-answer {
            color: #10b981;
        }

        .results-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .quiz-container, .results-container {
                padding: 20px;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .matching-container {
                grid-template-columns: 1fr;
            }

            .results-actions {
                grid-template-columns: 1fr;
            }

            .score-display {
                font-size: 2rem;
            }

            .category-result {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }

        .loading-screen {
            text-align: center;
            padding: 40px;
        }

        .loading-screen h2 {
            margin-bottom: 20px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="start-screen">
                <h1>🎵 音楽業界クイズ</h1>
                <p class="subtitle">音楽産業の知識をテストしよう</p>
                <p>音楽業界に関するクイズに挑戦します。<br>複数のカテゴリから問題を選んで、自分の知識を試してみてください！</p>
                <button class="btn btn-primary" onclick="showCategoryScreen()">スタート</button>
            </div>
        </div>

        <!-- Category Selection Screen -->
        <div id="categoryScreen" class="screen">
            <div class="category-header">
                <h2>カテゴリを選択</h2>
            </div>
            <div class="controls">
                <button class="btn btn-secondary btn-small" onclick="selectAllCategories()">全選択</button>
                <button class="btn btn-secondary btn-small" onclick="deselectAllCategories()">全解除</button>
            </div>
            <div class="category-grid" id="categoryGrid"></div>
            <div class="category-actions">
                <button class="btn btn-secondary" onclick="showStartScreen()">戻る</button>
                <button class="btn btn-primary" onclick="showCountScreen()">次へ</button>
            </div>
        </div>

        <!-- Question Count Selection Screen -->
        <div id="countScreen" class="screen">
            <div class="category-header">
                <h2>問題数を選択</h2>
            </div>
            <div class="count-buttons">
                <button class="count-btn" onclick="selectQuestionCount(5)">5問</button>
                <button class="count-btn" onclick="selectQuestionCount(10)">10問</button>
                <button class="count-btn" onclick="selectQuestionCount(20)">20問</button>
                <button class="count-btn" onclick="selectQuestionCount(null)">全問</button>
            </div>
            <div class="category-actions">
                <button class="btn btn-secondary" onclick="showCategoryScreen()">戻る</button>
                <button class="btn btn-primary" onclick="startQuiz()">スタート</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="question-info">
                    <span id="questionNumber">1</span> / <span id="totalQuestions">10</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-container">
                <div class="results-header">
                    <h2>クイズ結果</h2>
                    <div class="score-display" id="scoreDisplay">0</div>
                    <div class="score-details" id="scoreDetails">0 / 0</div>
                    <div class="percentage" id="percentageDisplay">0%</div>
                </div>

                <div class="results-section">
                    <h3>カテゴリ別正答率</h3>
                    <div id="categoryResults"></div>
                </div>

                <div class="results-section" id="incorrectSection" style="display: none;">
                    <h3>間違った問題</h3>
                    <div class="incorrect-questions" id="incorrectQuestions"></div>
                </div>

                <div class="results-actions">
                    <button class="btn btn-secondary" onclick="showCategoryScreen()">カテゴリ選択に戻る</button>
                    <button class="btn btn-primary" onclick="showCategoryScreen()">もう一度</button>
                </div>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loadingScreen" class="screen active">
            <div class="loading-screen">
                <h2>読み込み中...</h2>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            questions: [],
            categories: [],
            selectedCategories: [],
            questionCount: null,
            currentQuiz: [],
            currentQuestion: 0,
            answers: [],
            categoryAccuracy: {},
            matchingPairs: {},
            selectedTerm: null,
            answeredQuestions: []
        };

        // Initialize App
        async function initApp() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                state.questions = data.questions || [];
                state.categories = data.categories || [];

                state.categories.forEach(category => {
                    state.categoryAccuracy[category.id] = { correct: 0, total: 0 };
                });

                showScreen('startScreen');
            } catch (error) {
                console.error('Failed to load questions:', error);
                showErrorScreen(`クイズのデータ読み込みに失敗しました: ${error.message}`);
            }
        }

        function showErrorScreen(message) {
            showScreen('loadingScreen');
            document.getElementById('loadingScreen').innerHTML = `
                <div class="error-message">${message}</div>
            `;
        }

        // Screen Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function showStartScreen() {
            state.selectedCategories = [];
            state.questionCount = null;
            showScreen('startScreen');
        }

        function showCategoryScreen() {
            renderCategories();
            showScreen('categoryScreen');
        }

        function showCountScreen() {
            if (state.selectedCategories.length === 0) {
                alert('少なくとも1つのカテゴリを選択してください');
                return;
            }
            document.querySelectorAll('.count-btn').forEach(btn => btn.classList.remove('selected'));
            showScreen('countScreen');
        }

        // Category Management
        function renderCategories() {
            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';

            state.categories.forEach(category => {
                const card = document.createElement('div');
                card.className = 'category-card';
                if (state.selectedCategories.includes(category.id)) {
                    card.classList.add('selected');
                }
                card.innerHTML = `
                    <h3>${category.name}</h3>
                    <div class="count">${category.questions.length}問</div>
                `;
                card.onclick = () => toggleCategory(category.id);
                container.appendChild(card);
            });
        }

        function toggleCategory(categoryId) {
            const index = state.selectedCategories.indexOf(categoryId);
            if (index > -1) {
                state.selectedCategories.splice(index, 1);
            } else {
                state.selectedCategories.push(categoryId);
            }
            renderCategories();
        }

        function selectAllCategories() {
            state.selectedCategories = state.categories.map(c => c.id);
            renderCategories();
        }

        function deselectAllCategories() {
            state.selectedCategories = [];
            renderCategories();
        }

        // Question Count Selection
        function selectQuestionCount(count) {
            document.querySelectorAll('.count-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            state.questionCount = count;
        }

        // Quiz Preparation
        function startQuiz() {
            if (state.questionCount === null && document.querySelector('.count-btn.selected') === null) {
                alert('問題数を選択してください');
                return;
            }

            // Prepare questions
            let quizQuestions = [];
            state.selectedCategories.forEach(catId => {
                const category = state.categories.find(c => c.id === catId);
                if (category) {
                    quizQuestions = quizQuestions.concat(category.questions.map(q => ({...q, categoryId: catId})));
                }
            });

            // Shuffle and limit
            quizQuestions = shuffleArray(quizQuestions);
            if (state.questionCount !== null) {
                quizQuestions = quizQuestions.slice(0, state.questionCount);
            }

            state.currentQuiz = quizQuestions;
            state.currentQuestion = 0;
            state.answers = [];
            state.matchingPairs = {};
            state.answeredQuestions = [];

            showScreen('quizScreen');
            displayQuestion();
        }

        // Question Display
        function displayQuestion() {
            const question = state.currentQuiz[state.currentQuestion];
            const progress = ((state.currentQuestion) / state.currentQuiz.length) * 100;

            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNumber').textContent = state.currentQuestion + 1;
            document.getElementById('totalQuestions').textContent = state.currentQuiz.length;
            document.getElementById('questionText').innerHTML = formatQuestion(question);
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            state.selectedTerm = null;

            if (question.type === 'multiple_choice') {
                const options = shuffleArray([...question.options]);
                options.forEach((option, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option;
                    btn.onclick = () => selectAnswer(option);
                    optionsContainer.appendChild(btn);
                });
            } else if (question.type === 'true_false') {
                optionsContainer.className = 'true-false-options';
                ['○', '×'].forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn true-false';
                    btn.textContent = option;
                    btn.onclick = () => selectAnswer(option);
                    optionsContainer.appendChild(btn);
                });
            } else if (question.type === 'fill_blank') {
                const options = shuffleArray([...question.options]);
                options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option;
                    btn.onclick = () => selectAnswer(option);
                    optionsContainer.appendChild(btn);
                });
            } else if (question.type === 'matching') {
                displayMatching(question, optionsContainer);
            }
        }

        function formatQuestion(question) {
            if (question.type === 'fill_blank') {
                return question.question.replace('[___]', '<span class="blank-placeholder">?</span>');
            }
            return question.question;
        }

        function displayMatching(question, container) {
            const matchingDiv = document.createElement('div');
            matchingDiv.className = 'matching-container';

            const leftCol = document.createElement('div');
            leftCol.className = 'matching-column';

            const rightCol = document.createElement('div');
            rightCol.className = 'matching-column';

            const shuffledPairs = shuffleArray([...question.pairs]);

            question.pairs.forEach((pair, index) => {
                const term = document.createElement('div');
                term.className = 'matching-term';
                term.textContent = pair.term;
                term.dataset.index = index;
                term.onclick = () => selectMatchingTerm(index);
                leftCol.appendChild(term);
            });

            shuffledPairs.forEach((pair, index) => {
                const def = document.createElement('div');
                def.className = 'matching-definition';
                const originalIndex = question.pairs.findIndex(p => p.definition === pair.definition && p.term === pair.term);
                def.textContent = pair.definition;
                def.dataset.index = originalIndex;
                def.onclick = () => selectMatchingDefinition(originalIndex);
                rightCol.appendChild(def);
            });

            matchingDiv.appendChild(leftCol);
            matchingDiv.appendChild(rightCol);
            container.appendChild(matchingDiv);

            const btnDiv = document.createElement('div');
            btnDiv.style.gridColumn = '1 / -1';
            btnDiv.style.marginTop = '20px';
            const submitBtn = document.createElement('button');
            submitBtn.className = 'btn btn-primary';
            submitBtn.textContent = '判定する';
            submitBtn.onclick = () => submitMatchingAnswer();
            btnDiv.appendChild(submitBtn);
            container.appendChild(btnDiv);

            updateMatchingDisplay();
        }

        function selectMatchingTerm(index) {
            if (state.matchingPairs[index] !== undefined) return;

            const terms = document.querySelectorAll('.matching-term');
            terms.forEach(t => t.classList.remove('selected'));

            if (state.selectedTerm === index) {
                state.selectedTerm = null;
            } else {
                state.selectedTerm = index;
                terms[index].classList.add('selected');
            }
        }

        function selectMatchingDefinition(index) {
            if (state.matchingPairs[index] !== undefined) return;
            if (state.selectedTerm === null) return;

            state.matchingPairs[state.selectedTerm] = index;
            state.selectedTerm = null;

            const terms = document.querySelectorAll('.matching-term');
            terms.forEach(t => t.classList.remove('selected'));

            updateMatchingDisplay();
        }

        function updateMatchingDisplay() {
            document.querySelectorAll('.matching-term, .matching-definition').forEach(el => {
                el.classList.remove('paired');
            });

            const terms = document.querySelectorAll('.matching-term');
            const defs = document.querySelectorAll('.matching-definition');

            Object.keys(state.matchingPairs).forEach(termIdx => {
                const defIdx = state.matchingPairs[termIdx];
                if (terms[termIdx]) terms[termIdx].classList.add('paired');
                defs.forEach(def => {
                    if (def.dataset.index == defIdx) def.classList.add('paired');
                });
            });
        }

        function submitMatchingAnswer() {
            const question = state.currentQuiz[state.currentQuestion];
            const allMatched = question.pairs.length === Object.keys(state.matchingPairs).length;

            if (!allMatched) {
                alert('すべてのペアをマッチングしてください');
                return;
            }

            const correct = question.pairs.every((pair, index) => {
                return state.matchingPairs[index] === index;
            });

            selectAnswer(null, correct);
        }

        // Answer Selection
        function selectAnswer(answer, isMatching = false) {
            const question = state.currentQuiz[state.currentQuestion];
            const isCorrect = isMatching ? isMatching : (
                question.type === 'matching' ? false :
                answer === question.correctAnswer
            );

            state.answers.push({
                questionIndex: state.currentQuestion,
                answer: answer,
                isCorrect: isCorrect
            });

            state.answeredQuestions.push({
                ...question,
                userAnswer: answer,
                isCorrect: isCorrect
            });

            state.categoryAccuracy[question.categoryId].total++;
            if (isCorrect) {
                state.categoryAccuracy[question.categoryId].correct++;
            }

            showFeedback(isCorrect, question);
        }

        function showFeedback(isCorrect, question) {
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');

            let content = `<h3>${isCorrect ? '✓ 正解！' : '✗ 不正解'}</h3>`;

            if (!isCorrect) {
                if (question.type === 'matching') {
                    content += `<p class="explanation">正しいペアリング:</p>`;
                    question.pairs.forEach(pair => {
                        content += `<p>• ${pair.term} → ${pair.definition}</p>`;
                    });
                } else {
                    content += `<p><strong>正答:</strong> ${question.correctAnswer}</p>`;
                }
            }

            if (question.explanation) {
                content += `<p class="explanation"><strong>解説:</strong> ${question.explanation}</p>`;
            }

            feedbackDiv.innerHTML = content;

            // Disable option buttons
            document.querySelectorAll('.option-btn, .matching-term, .matching-definition').forEach(btn => {
                btn.disabled = true;
            });

            setTimeout(() => {
                nextQuestion();
            }, 2500);
        }

        // Navigation
        function nextQuestion() {
            state.currentQuestion++;
            if (state.currentQuestion < state.currentQuiz.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        // Results Display
        function showResults() {
            const correct = state.answers.filter(a => a.isCorrect).length;
            const total = state.answers.length;
            const percentage = Math.round((correct / total) * 100);

            document.getElementById('scoreDisplay').textContent = correct;
            document.getElementById('scoreDetails').textContent = `${correct} / ${total}`;
            document.getElementById('percentageDisplay').textContent = `${percentage}%`;

            // Category results
            const categoryResultsDiv = document.getElementById('categoryResults');
            categoryResultsDiv.innerHTML = '';
            state.selectedCategories.forEach(catId => {
                const category = state.categories.find(c => c.id === catId);
                const accuracy = state.categoryAccuracy[catId];
                const acc = accuracy.total > 0 ? Math.round((accuracy.correct / accuracy.total) * 100) : 0;

                const resultDiv = document.createElement('div');
                resultDiv.className = 'category-result';
                resultDiv.innerHTML = `
                    <span class="name">${category.name}</span>
                    <span class="accuracy">${accuracy.correct} / ${accuracy.total} (${acc}%)</span>
                `;
                categoryResultsDiv.appendChild(resultDiv);
            });

            // Incorrect questions
            const incorrectQuestions = state.answeredQuestions.filter(q => !q.isCorrect);
            if (incorrectQuestions.length > 0) {
                document.getElementById('incorrectSection').style.display = 'block';
                const incorrectDiv = document.getElementById('incorrectQuestions');
                incorrectDiv.innerHTML = '';
                incorrectQuestions.forEach(q => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'incorrect-item';
                    let content = `<div class="q-text">${q.question}</div>`;
                    content += `<div class="answer-row"><span class="label">あなたの回答:</span><span class="your-answer">${q.userAnswer || 'マッチング失敗'}</span></div>`;
                    content += `<div class="answer-row"><span class="label">正答:</span><span class="correct-answer">${q.correctAnswer}</span></div>`;
                    itemDiv.innerHTML = content;
                    incorrectDiv.appendChild(itemDiv);
                });
            } else {
                document.getElementById('incorrectSection').style.display = 'none';
            }

            showScreen('resultsScreen');
        }

        // Utility Functions
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
